syntax = "proto3";

package events.v1;

// The protocol used to submit the transaction (e.g., QUIC, UDP, ...)
enum TxnProtocol {
  TXN_PROTOCOL_UNSPECIFIED = 0;
  TXN_PROTOCOL_QUIC = 1;  // QUIC
  TXN_PROTOCOL_UDP = 2;  // UDP
  TXN_PROTOCOL_GOSSIP = 3;  // Gossip
  TXN_PROTOCOL_BUNDLE = 4;  // Bundle
  TXN_PROTOCOL_TXSEND = 5;  // Internal vote sender
}

// The protocol used to send the shred
enum ShredProtocol {
  SHRED_PROTOCOL_UNSPECIFIED = 0;
  SHRED_PROTOCOL_TURBINE = 1;  // Turbine
  SHRED_PROTOCOL_REPAIR = 2;  // Repair
  SHRED_PROTOCOL_LEADER = 3;  // Leader
}

// The commitment level reached, from weakest to strongest: processed, propagated, duplicate, optimistic, super, rooted. ignored is a separate terminal outcome rather than a strengthening level.
enum SlotConfirmedLevel {
  SLOT_CONFIRMED_LEVEL_UNSPECIFIED = 0;
  SLOT_CONFIRMED_LEVEL_IGNORED = 1;  // Replay finished a block that consensus had already pruned, so it never reached any commitment level.
  SLOT_CONFIRMED_LEVEL_PROCESSED = 2;  // Replayed locally on the majority fork, with no cluster stake required. Equivalent to Solana's 'processed' commitment.
  SLOT_CONFIRMED_LEVEL_PROPAGATED = 3;  // More than a third of stake has observed the block, confirming it has propagated.
  SLOT_CONFIRMED_LEVEL_DUPLICATE = 4;  // At least 52% of stake voted for this exact block, guaranteeing the cluster converges on it even when a slot equivocates.
  SLOT_CONFIRMED_LEVEL_OPTIMISTIC = 5;  // More than two thirds of stake voted for the block. Equivalent to Solana's 'confirmed' commitment.
  SLOT_CONFIRMED_LEVEL_SUPER = 6;  // More than four fifths of stake voted for the block. Used when waiting for a supermajority at boot.
  SLOT_CONFIRMED_LEVEL_ROOTED = 7;  // The block or a descendant reached maximum lockout and can never be rolled back. The strongest level, equivalent to Solana's 'finalized' commitment.
}

// Transaction execution error
enum RuntimeTxnTxnErr {
  RUNTIME_TXN_TXN_ERR_UNSPECIFIED = 0;
  RUNTIME_TXN_TXN_ERR_SUCCESS = 1;  // Transaction succeeded
  RUNTIME_TXN_TXN_ERR_ACCOUNT_LOADED_TWICE = 2;  // A Pubkey appears twice in the transaction's account_keys
  RUNTIME_TXN_TXN_ERR_ACCOUNT_NOT_FOUND = 3;  // Attempt to debit an account but found no record of a prior credit
  RUNTIME_TXN_TXN_ERR_PROGRAM_ACCOUNT_NOT_FOUND = 4;  // Attempt to load a program that does not exist
  RUNTIME_TXN_TXN_ERR_INSUFFICIENT_FUNDS_FOR_FEE = 5;  // Fee payer has insufficient lamports to cover the transaction fee
  RUNTIME_TXN_TXN_ERR_INVALID_ACCOUNT_FOR_FEE = 6;  // This account may not be used to pay transaction fees
  RUNTIME_TXN_TXN_ERR_ALREADY_PROCESSED = 7;  // The bank has seen this transaction before
  RUNTIME_TXN_TXN_ERR_BLOCKHASH_NOT_FOUND = 8;  // The bank has not seen the given recent_blockhash or the transaction is too old and the recent_blockhash has been discarded.
  RUNTIME_TXN_TXN_ERR_INSTRUCTION_ERROR = 9;  // An error occurred while processing an instruction, look at exec_err for more details
  RUNTIME_TXN_TXN_ERR_SIGNATURE_FAILURE = 10;  // Transaction did not pass signature verification
  RUNTIME_TXN_TXN_ERR_INVALID_PROGRAM_FOR_EXECUTION = 11;  // This program may not be used for executing instructions
  RUNTIME_TXN_TXN_ERR_SANITIZE_FAILURE = 12;  // Transaction failed to sanitize accounts offsets correctly
  RUNTIME_TXN_TXN_ERR_WOULD_EXCEED_MAX_BLOCK_COST_LIMIT = 13;  // Transaction would exceed max Block Cost Limit
  RUNTIME_TXN_TXN_ERR_WOULD_EXCEED_MAX_ACCOUNT_COST_LIMIT = 14;  // Transaction would exceed max account limit within the block
  RUNTIME_TXN_TXN_ERR_WOULD_EXCEED_ACCOUNT_DATA_BLOCK_LIMIT = 15;  // Transaction would exceed account data limit within the block
  RUNTIME_TXN_TXN_ERR_TOO_MANY_ACCOUNT_LOCKS = 16;  // Transaction locked too many accounts
  RUNTIME_TXN_TXN_ERR_ADDRESS_LOOKUP_TABLE_NOT_FOUND = 17;  // Transaction loads an address table account that doesn't exist
  RUNTIME_TXN_TXN_ERR_INVALID_ADDRESS_LOOKUP_TABLE_OWNER = 18;  // Transaction loads an address table account with an invalid owner
  RUNTIME_TXN_TXN_ERR_INVALID_ADDRESS_LOOKUP_TABLE_DATA = 19;  // Transaction loads an address table account with invalid data
  RUNTIME_TXN_TXN_ERR_INVALID_ADDRESS_LOOKUP_TABLE_INDEX = 20;  // Transaction address table lookup uses an invalid index
  RUNTIME_TXN_TXN_ERR_WOULD_EXCEED_MAX_VOTE_COST_LIMIT = 21;  // Transaction would exceed max Vote Cost Limit
  RUNTIME_TXN_TXN_ERR_WOULD_EXCEED_ACCOUNT_DATA_TOTAL_LIMIT = 22;  // Transaction would exceed total account data limit
  RUNTIME_TXN_TXN_ERR_DUPLICATE_INSTRUCTION = 23;  // Transaction contains a duplicate instruction that is not allowed
  RUNTIME_TXN_TXN_ERR_INSUFFICIENT_FUNDS_FOR_RENT = 24;  // Transaction results in an account with insufficient funds for rent
  RUNTIME_TXN_TXN_ERR_MAX_LOADED_ACCOUNTS_DATA_SIZE_EXCEEDED = 25;  // Transaction exceeded max loaded accounts data size cap
  RUNTIME_TXN_TXN_ERR_INVALID_LOADED_ACCOUNTS_DATA_SIZE_LIMIT = 26;  // Transaction requested a zero loaded-accounts-data-size limit
  RUNTIME_TXN_TXN_ERR_UNBALANCED_TRANSACTION = 27;  // Sum of account balances before and after transaction do not match
  RUNTIME_TXN_TXN_ERR_BUNDLE_PEER = 28;  // Transaction was part of a bundle in which another transaction failed
  RUNTIME_TXN_TXN_ERR_BLOCKHASH_NONCE_ALREADY_ADVANCED = 29;  // Durable-nonce txn was rejected because its nonce account has already been advanced
  RUNTIME_TXN_TXN_ERR_BLOCKHASH_FAIL_ADVANCE_NONCE_INSTR = 30;  // Durable-nonce txn failed to advance its nonce account
  RUNTIME_TXN_TXN_ERR_BLOCKHASH_FAIL_WRONG_NONCE = 31;  // Durable-nonce txn's recent_blockhash did not match the stored nonce
}

// Instruction execution error; only meaningful when txn_err = instruction_error
enum RuntimeTxnExecErr {
  RUNTIME_TXN_EXEC_ERR_UNSPECIFIED = 0;
  RUNTIME_TXN_EXEC_ERR_SUCCESS = 1;  // instruction succeeded
  RUNTIME_TXN_EXEC_ERR_GENERIC_ERR = 2;  // The program instruction returned an error
  RUNTIME_TXN_EXEC_ERR_INVALID_ARG = 3;  // The arguments provided to a program were invalid
  RUNTIME_TXN_EXEC_ERR_INVALID_INSTR_DATA = 4;  // An instruction's data contents were invalid
  RUNTIME_TXN_EXEC_ERR_INVALID_ACC_DATA = 5;  // An account's data contents was invalid
  RUNTIME_TXN_EXEC_ERR_ACC_DATA_TOO_SMALL = 6;  // An account's data was too small
  RUNTIME_TXN_EXEC_ERR_INSUFFICIENT_FUNDS = 7;  // An account's balance was too small to complete the instruction
  RUNTIME_TXN_EXEC_ERR_INCORRECT_PROGRAM_ID = 8;  // The account did not have the expected program id
  RUNTIME_TXN_EXEC_ERR_MISSING_REQUIRED_SIGNATURE = 9;  // A signature was required but not found
  RUNTIME_TXN_EXEC_ERR_ACC_ALREADY_INITIALIZED = 10;  // An initialize instruction was sent to an account that has already been initialized.
  RUNTIME_TXN_EXEC_ERR_UNINITIALIZED_ACCOUNT = 11;  // An attempt to operate on an account that hasn't been initialized.
  RUNTIME_TXN_EXEC_ERR_UNBALANCED_INSTR = 12;  // Program's instruction lamport balance does not equal the balance after the instruction
  RUNTIME_TXN_EXEC_ERR_MODIFIED_PROGRAM_ID = 13;  // Program illegally modified an account's program id
  RUNTIME_TXN_EXEC_ERR_EXTERNAL_ACCOUNT_LAMPORT_SPEND = 14;  // Program spent the lamports of an account that doesn't belong to it
  RUNTIME_TXN_EXEC_ERR_EXTERNAL_DATA_MODIFIED = 15;  // Program modified the data of an account that doesn't belong to it
  RUNTIME_TXN_EXEC_ERR_READONLY_LAMPORT_CHANGE = 16;  // Read-only account's lamports modified
  RUNTIME_TXN_EXEC_ERR_READONLY_DATA_MODIFIED = 17;  // Read-only account's data was modified
  RUNTIME_TXN_EXEC_ERR_EXECUTABLE_MODIFIED = 18;  // Executable bit on account changed, but shouldn't have
  RUNTIME_TXN_EXEC_ERR_NOT_ENOUGH_ACC_KEYS = 19;  // The instruction expected additional account keys
  RUNTIME_TXN_EXEC_ERR_ACC_DATA_SIZE_CHANGED = 20;  // Program other than the account's owner changed the size of the account data
  RUNTIME_TXN_EXEC_ERR_ACC_BORROW_FAILED = 21;  // Failed to borrow a reference to account data, already borrowed
  RUNTIME_TXN_EXEC_ERR_ACC_BORROW_OUTSTANDING = 22;  // Account data has an outstanding reference after a program's execution
  RUNTIME_TXN_EXEC_ERR_CUSTOM_ERR = 23;  // Allows on-chain programs to implement program-specific error types and see them returned by the runtime.
  RUNTIME_TXN_EXEC_ERR_INVALID_ERR = 24;  // The return value from the program was invalid.
  RUNTIME_TXN_EXEC_ERR_EXECUTABLE_ACCOUNT_NOT_RENT_EXEMPT = 25;  // Executable accounts must be rent exempt
  RUNTIME_TXN_EXEC_ERR_UNSUPPORTED_PROGRAM_ID = 26;  // Unsupported program id
  RUNTIME_TXN_EXEC_ERR_CALL_DEPTH = 27;  // Cross-program invocation call depth too deep
  RUNTIME_TXN_EXEC_ERR_MISSING_ACC = 28;  // An account required by the instruction is missing
  RUNTIME_TXN_EXEC_ERR_REENTRANCY_NOT_ALLOWED = 29;  // Cross-program invocation reentrancy not allowed for this instruction
  RUNTIME_TXN_EXEC_ERR_MAX_SEED_LENGTH_EXCEEDED = 30;  // Length of the seed is too long for address generation
  RUNTIME_TXN_EXEC_ERR_INVALID_SEEDS = 31;  // Provided seeds do not result in a valid address
  RUNTIME_TXN_EXEC_ERR_INVALID_REALLOC = 32;  // Failed to reallocate account data of this length
  RUNTIME_TXN_EXEC_ERR_COMPUTE_BUDGET_EXCEEDED = 33;  // Computational budget exceeded
  RUNTIME_TXN_EXEC_ERR_PRIVILEGE_ESCALATION = 34;  // Cross-program invocation with unauthorized signer or writable account
  RUNTIME_TXN_EXEC_ERR_PROGRAM_ENVIRONMENT_SETUP_FAILURE = 35;  // Failed to create program execution environment
  RUNTIME_TXN_EXEC_ERR_PROGRAM_FAILED_TO_COMPLETE = 36;  // Program failed to complete
  RUNTIME_TXN_EXEC_ERR_ACC_IMMUTABLE = 37;  // Account is immutable
  RUNTIME_TXN_EXEC_ERR_INCORRECT_AUTHORITY = 38;  // Incorrect authority provided
  RUNTIME_TXN_EXEC_ERR_BORSH_IO_ERROR = 39;  // Failed to serialize or deserialize account data
  RUNTIME_TXN_EXEC_ERR_ACC_NOT_RENT_EXEMPT = 40;  // An account does not have enough lamports to be rent-exempt
  RUNTIME_TXN_EXEC_ERR_INVALID_ACC_OWNER = 41;  // Invalid account owner
  RUNTIME_TXN_EXEC_ERR_ARITHMETIC_OVERFLOW = 42;  // Program arithmetic overflowed
  RUNTIME_TXN_EXEC_ERR_UNSUPPORTED_SYSVAR = 43;  // Unsupported sysvar
  RUNTIME_TXN_EXEC_ERR_ILLEGAL_OWNER = 44;  // Provided owner is not allowed
  RUNTIME_TXN_EXEC_ERR_MAX_ACCS_DATA_ALLOCS_EXCEEDED = 45;  // Account data allocation exceeded the maximum accounts data size limit
  RUNTIME_TXN_EXEC_ERR_MAX_ACCS_EXCEEDED = 46;  // Max accounts exceeded
  RUNTIME_TXN_EXEC_ERR_MAX_INSN_TRACE_LENS_EXCEEDED = 47;  // Max instruction trace length exceeded
  RUNTIME_TXN_EXEC_ERR_BUILTINS_MUST_CONSUME_CUS = 48;  // Builtin programs must consume compute units
}

// Source kind of exec_err; only meaningful when txn_err = instruction_error
enum RuntimeTxnExecErrKind {
  RUNTIME_TXN_EXEC_ERR_KIND_UNSPECIFIED = 0;
  RUNTIME_TXN_EXEC_ERR_KIND_NONE = 1;  // no instruction error
  RUNTIME_TXN_EXEC_ERR_KIND_EBPF = 2;  // eBPF VM error
  RUNTIME_TXN_EXEC_ERR_KIND_SYSCALL = 3;  // Syscall error
  RUNTIME_TXN_EXEC_ERR_KIND_INSTR = 4;  // Instruction error
}

// Slot that was voted on
message SignedVoteTower {
  // Slot being voted on / locked out for
  uint64 slot = 1;
  // Confirmation count (higher = closer to root)
  uint32 confirmation_count = 2;
}

// Per-account diff entry
message RuntimeTxnAccountDiffs {
  // Account pubkey
  bytes pubkey = 1;
  // Post-state owner pubkey
  bytes owner = 2;
  // Pre-state owner pubkey
  bytes prev_owner = 3;
  // Post-state lamports
  uint64 lamports = 4;
  // Pre-state lamports
  uint64 prev_lamports = 5;
  // Post-state data size in bytes
  uint64 data_sz = 6;
  // Pre-state data size in bytes
  uint64 prev_data_sz = 7;
  // True if the post-state account is executable
  bool is_executable = 8;
  // True if this write touched the stake cache
  bool is_stake_update = 9;
  // True if this write touched the vote cache
  bool is_vote_update = 10;
  // True if this write created a new vote account
  bool is_new_vote = 11;
  // True if this write removed a vote account
  bool is_rm_vote = 12;
}

// The validator received a verified, deduplicated transaction
message Txn {
  // The source IP address of the transaction sender
  bytes source_ip = 1;
  // The source port of the transaction sender
  uint32 source_port = 2;
  // The protocol used to submit the transaction (e.g., QUIC, UDP, ...)
  TxnProtocol protocol = 3;
  // The ID of the bundle this transaction belongs to, if any.  Zero indicates not a bundle transaction
  uint64 bundle_id = 4;
  // The total number of transactions in the bundle this transaction belongs to, if any
  uint32 bundle_txn_count = 5;
  // The commission percentage for the bundle this transaction belongs to, if any
  uint32 bundle_commission = 6;
  // The public key of the commission recipient for the bundle this transaction belongs to, if any
  bytes bundle_commission_pubkey = 7;
  // The raw transaction payload bytes
  bytes payload = 8;
}

// The validator received a valid shred
message Shred {
  // The source IP address of the shred
  bytes source_ip = 1;
  // The source port of the shred
  uint32 source_port = 2;
  // The protocol used to send the shred
  ShredProtocol protocol = 3;
  // The raw shred payload bytes
  bytes payload = 4;
}

// The validator generated a vote transaction
message SignedVote {
  // Serialized signed vote transaction
  bytes signed_txn = 1;
  // The public key of the vote account
  bytes vote_account = 2;
  // The public key that authorized the vote
  bytes vote_authority = 3;
  // The public key that pays for transaction fees
  bytes fee_payer = 4;
  // Signature identifying the transaction
  bytes signature = 5;
  // Slot being voted on (top of tower)
  uint64 vote_slot = 6;
  // Bank hash of the slot being voted on
  bytes vote_bank_hash = 7;
  // Block ID of the slot being voted on
  bytes vote_block_id = 8;
  // Recent blockhash parameter of the vote transaction
  bytes txn_blockhash = 9;
  // Tower of slots being voted on (oldest to newest)
  repeated SignedVoteTower tower = 10;
}

// A slot reached a commitment level. Emitted once per slot per level reached. Join to block_completed on bank_seq, or on slot and block_id.
message SlotConfirmed {
  // Monotonic sequence number identifying this block within the current run; the join key to block_completed. Restarts at 1 each time a snapshot is loaded, so pair it with the stream's boot id. 0 means unavailable, which happens for forward confirmations where the block has not been replayed.
  uint64 bank_seq = 1;
  // The slot being confirmed.
  uint64 slot = 2;
  // Unique identifier of the block being confirmed; the join key to block_completed.
  bytes block_id = 3;
  // Stake in lamports supporting this confirmation. Divide by total_stake for the ratio that crossed the level's threshold. 0 means unavailable.
  uint64 stake = 4;
  // Total cluster stake in lamports at confirmation time; the denominator for the confirmation ratio. 0 means unavailable.
  uint64 total_stake = 5;
  // Whether this block is eligible for fork choice. An equivocating block becomes eligible again only once duplicate confirmed.
  bool valid = 6;
  // The commitment level reached, from weakest to strongest: processed, propagated, duplicate, optimistic, super, rooted. ignored is a separate terminal outcome rather than a strengthening level.
  SlotConfirmedLevel level = 7;
  // True when the block was confirmed by votes seen over gossip before it was replayed locally. Always false for processed and rooted, which require a local replay.
  bool forward = 8;
}

// One row per dispatched transaction (committable or not), with the execution results
message RuntimeTxn {
  // Monotonic sequence number identifying this block within the current run; the join key to block_completed. Restarts at 1 each time a snapshot is loaded, so pair it with the stream's boot id. 0 means unavailable.
  uint64 bank_seq = 1;
  // Bank slot in which this transaction was executed
  uint64 slot = 2;
  // 0-indexed position of this transaction within its block
  uint64 index_in_slot = 3;
  // 0-indexed commit-completion order within this slot
  uint64 commit_index_in_slot = 4;
  // FEC merkle root that was the current block_id of the bank when this txn was dispatched; NULL on the leader path
  bytes fec_merkle_root = 5;
  // Epoch the transaction was executed in
  uint64 epoch = 6;
  // First signature of the transaction (64 bytes)
  bytes signature = 7;
  // Blockhash referenced by the transaction
  bytes blockhash = 8;
  // Fee-payer pubkey
  bytes fee_payer = 9;
  // True if the transaction was classified as a simple vote, false otherwise
  bool is_simple_vote = 10;
  // True if the transaction is part of a bundle, false otherwise
  bool is_bundle = 11;
  // True if the transaction was committable (landed on-chain)
  bool is_committable = 12;
  // True if the transaction landed but only fees were charged (e.g. account loading failure)
  bool is_fees_only = 13;
  // Transaction execution error
  RuntimeTxnTxnErr txn_err = 14;
  // Instruction execution error; only meaningful when txn_err = instruction_error
  RuntimeTxnExecErr exec_err = 15;
  // Source kind of exec_err; only meaningful when txn_err = instruction_error
  RuntimeTxnExecErrKind exec_err_kind = 16;
  // Instruction index that failed (UINT_MAX if not applicable)
  uint32 exec_err_idx = 17;
  // Custom error code returned by the program (only meaningful for CUSTOM_ERROR)
  uint32 custom_err = 18;
  // Compute unit limit requested by the transaction
  uint64 compute_unit_limit = 19;
  // Compute unit price (micro-lamports per CU) requested by the transaction
  uint64 compute_unit_price = 20;
  // compute_unit_limit minus the remaining compute meter at commit
  uint64 compute_units_consumed = 21;
  // Requested heap size for the VM
  uint64 heap_size = 22;
  // Number of builtin program instructions in the transaction
  uint64 num_builtin_instrs = 23;
  // Number of BPF (non-builtin) program instructions
  uint64 num_non_builtin_instrs = 24;
  // Total bytes of account data loaded for this transaction
  uint64 loaded_accounts_data_size = 25;
  // Configured loaded-accounts-data-size limit for this transaction
  uint64 loaded_accounts_data_size_limit = 26;
  // Absolute magnitude of net delta in writable account data sizes during execution; check accounts_resize_is_negative for sign
  uint64 accounts_resize_delta = 27;
  // True when the net delta is negative (writable account data net shrunk during execution)
  bool accounts_resize_is_negative = 28;
  // Execution fee paid by the fee payer
  uint64 execution_fee = 29;
  // Priority fee paid by the fee payer
  uint64 priority_fee = 30;
  // Tips paid during execution
  uint64 tips = 31;
  // Number of signatures in the transaction
  uint64 signature_count = 32;
  // Cost-tracker signature cost
  uint32 cost_signature = 33;
  // Cost-tracker write-lock cost
  uint32 cost_write_lock = 34;
  // Cost-tracker data-bytes cost
  uint32 cost_data_bytes = 35;
  // Cost-tracker programs-execution cost
  uint32 cost_programs_execution = 36;
  // Cost-tracker loaded-accounts-data-size cost
  uint32 cost_loaded_accounts_data_size = 37;
  // Allocated accounts data size from the cost tracker
  uint64 cost_allocated_accounts_data_size = 38;
  // Per-account diffs for writable accounts that were modified
  repeated RuntimeTxnAccountDiffs account_diffs = 39;
  // Every account the transaction locked as writable
  repeated bytes writable_accounts = 40;
  // Every account the transaction locked as readonly, in account-order
  repeated bytes readonly_accounts = 41;
  // Distinct program pubkeys invoked at the top level of this transaction
  repeated bytes program_ids = 42;
}

// Combined event type
message Event {
  oneof event {
    Txn txn = 1;
    Shred shred = 2;
    SignedVote signed_vote = 3;
    SlotConfirmed slot_confirmed = 4;
    RuntimeTxn runtime_txn = 5;
  }
}
