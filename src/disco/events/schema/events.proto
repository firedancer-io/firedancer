syntax = "proto3";

package events.v1;

// The protocol used to submit the transaction (e.g., QUIC, UDP, ...)
enum TxnProtocol {
  TXN_PROTOCOL_UNSPECIFIED = 0;
  TXN_PROTOCOL_QUIC = 1;  // QUIC
  TXN_PROTOCOL_UDP = 2;  // UDP
  TXN_PROTOCOL_GOSSIP = 3;  // Gossip
  TXN_PROTOCOL_BUNDLE = 4;  // Bundle
  TXN_PROTOCOL_TXSEND = 5;  // Internal vote sender
}

// The protocol used to send the shred
enum ShredProtocol {
  SHRED_PROTOCOL_UNSPECIFIED = 0;
  SHRED_PROTOCOL_TURBINE = 1;  // Turbine
  SHRED_PROTOCOL_REPAIR = 2;  // Repair
  SHRED_PROTOCOL_LEADER = 3;  // Leader
}

// The commitment level reached, from weakest to strongest: processed, propagated, duplicate, optimistic, super, rooted. ignored is a separate terminal outcome rather than a strengthening level.
enum SlotConfirmedLevel {
  SLOT_CONFIRMED_LEVEL_UNSPECIFIED = 0;
  SLOT_CONFIRMED_LEVEL_IGNORED = 1;  // Replay finished a block that consensus had already pruned, so it never reached any commitment level.
  SLOT_CONFIRMED_LEVEL_PROCESSED = 2;  // Replayed locally on the majority fork, with no cluster stake required. Equivalent to Solana's 'processed' commitment.
  SLOT_CONFIRMED_LEVEL_PROPAGATED = 3;  // More than a third of stake has observed the block, confirming it has propagated.
  SLOT_CONFIRMED_LEVEL_DUPLICATE = 4;  // At least 52% of stake voted for this exact block, guaranteeing the cluster converges on it even when a slot equivocates.
  SLOT_CONFIRMED_LEVEL_OPTIMISTIC = 5;  // More than two thirds of stake voted for the block. Equivalent to Solana's 'confirmed' commitment.
  SLOT_CONFIRMED_LEVEL_SUPER = 6;  // More than four fifths of stake voted for the block. Used when waiting for a supermajority at boot.
  SLOT_CONFIRMED_LEVEL_ROOTED = 7;  // The block or a descendant reached maximum lockout and can never be rolled back. The strongest level, equivalent to Solana's 'finalized' commitment.
}

// Transaction execution error (success when transaction succeeded)
enum RuntimeTxnTxnErr {
  RUNTIME_TXN_TXN_ERR_UNSPECIFIED = 0;
  RUNTIME_TXN_TXN_ERR_SUCCESS = 1;  // transaction succeeded
  RUNTIME_TXN_TXN_ERR_ACCOUNT_IN_USE = 2;  // account in use
  RUNTIME_TXN_TXN_ERR_ACCOUNT_LOADED_TWICE = 3;  // account loaded twice
  RUNTIME_TXN_TXN_ERR_ACCOUNT_NOT_FOUND = 4;  // account not found
  RUNTIME_TXN_TXN_ERR_PROGRAM_ACCOUNT_NOT_FOUND = 5;  // program account not found
  RUNTIME_TXN_TXN_ERR_INSUFFICIENT_FUNDS_FOR_FEE = 6;  // insufficient funds for fee
  RUNTIME_TXN_TXN_ERR_INVALID_ACCOUNT_FOR_FEE = 7;  // invalid account for fee
  RUNTIME_TXN_TXN_ERR_ALREADY_PROCESSED = 8;  // already processed
  RUNTIME_TXN_TXN_ERR_BLOCKHASH_NOT_FOUND = 9;  // blockhash not found
  RUNTIME_TXN_TXN_ERR_INSTRUCTION_ERROR = 10;  // instruction error
  RUNTIME_TXN_TXN_ERR_CALL_CHAIN_TOO_DEEP = 11;  // call chain too deep
  RUNTIME_TXN_TXN_ERR_MISSING_SIGNATURE_FOR_FEE = 12;  // missing signature for fee
  RUNTIME_TXN_TXN_ERR_INVALID_ACCOUNT_INDEX = 13;  // invalid account index
  RUNTIME_TXN_TXN_ERR_SIGNATURE_FAILURE = 14;  // signature failure
  RUNTIME_TXN_TXN_ERR_INVALID_PROGRAM_FOR_EXECUTION = 15;  // invalid program for execution
  RUNTIME_TXN_TXN_ERR_SANITIZE_FAILURE = 16;  // sanitize failure
  RUNTIME_TXN_TXN_ERR_CLUSTER_MAINTENANCE = 17;  // cluster maintenance
  RUNTIME_TXN_TXN_ERR_ACCOUNT_BORROW_OUTSTANDING = 18;  // account borrow outstanding
  RUNTIME_TXN_TXN_ERR_WOULD_EXCEED_MAX_BLOCK_COST_LIMIT = 19;  // would exceed max block cost limit
  RUNTIME_TXN_TXN_ERR_UNSUPPORTED_VERSION = 20;  // unsupported version
  RUNTIME_TXN_TXN_ERR_INVALID_WRITABLE_ACCOUNT = 21;  // invalid writable account
  RUNTIME_TXN_TXN_ERR_WOULD_EXCEED_MAX_ACCOUNT_COST_LIMIT = 22;  // would exceed max account cost limit
  RUNTIME_TXN_TXN_ERR_WOULD_EXCEED_ACCOUNT_DATA_BLOCK_LIMIT = 23;  // would exceed account data block limit
  RUNTIME_TXN_TXN_ERR_TOO_MANY_ACCOUNT_LOCKS = 24;  // too many account locks
  RUNTIME_TXN_TXN_ERR_ADDRESS_LOOKUP_TABLE_NOT_FOUND = 25;  // address lookup table not found
  RUNTIME_TXN_TXN_ERR_INVALID_ADDRESS_LOOKUP_TABLE_OWNER = 26;  // invalid address lookup table owner
  RUNTIME_TXN_TXN_ERR_INVALID_ADDRESS_LOOKUP_TABLE_DATA = 27;  // invalid address lookup table data
  RUNTIME_TXN_TXN_ERR_INVALID_ADDRESS_LOOKUP_TABLE_INDEX = 28;  // invalid address lookup table index
  RUNTIME_TXN_TXN_ERR_INVALID_RENT_PAYING_ACCOUNT = 29;  // invalid rent paying account
  RUNTIME_TXN_TXN_ERR_WOULD_EXCEED_MAX_VOTE_COST_LIMIT = 30;  // would exceed max vote cost limit
  RUNTIME_TXN_TXN_ERR_WOULD_EXCEED_ACCOUNT_DATA_TOTAL_LIMIT = 31;  // would exceed account data total limit
  RUNTIME_TXN_TXN_ERR_DUPLICATE_INSTRUCTION = 32;  // duplicate instruction
  RUNTIME_TXN_TXN_ERR_INSUFFICIENT_FUNDS_FOR_RENT = 33;  // insufficient funds for rent
  RUNTIME_TXN_TXN_ERR_MAX_LOADED_ACCOUNTS_DATA_SIZE_EXCEEDED = 34;  // max loaded accounts data size exceeded
  RUNTIME_TXN_TXN_ERR_INVALID_LOADED_ACCOUNTS_DATA_SIZE_LIMIT = 35;  // invalid loaded accounts data size limit
  RUNTIME_TXN_TXN_ERR_RESANITIZATION_NEEDED = 36;  // resanitization needed
  RUNTIME_TXN_TXN_ERR_PROGRAM_EXECUTION_TEMPORARILY_RESTRICTED = 37;  // program execution temporarily restricted
  RUNTIME_TXN_TXN_ERR_UNBALANCED_TRANSACTION = 38;  // unbalanced transaction
  RUNTIME_TXN_TXN_ERR_PROGRAM_CACHE_HIT_MAX_LIMIT = 39;  // program cache hit max limit
  RUNTIME_TXN_TXN_ERR_COMMIT_CANCELLED = 40;  // commit cancelled
  RUNTIME_TXN_TXN_ERR_BUNDLE_PEER = 41;  // bundle peer
  RUNTIME_TXN_TXN_ERR_BLOCKHASH_NONCE_ALREADY_ADVANCED = 42;  // blockhash nonce already advanced
  RUNTIME_TXN_TXN_ERR_BLOCKHASH_FAIL_ADVANCE_NONCE_INSTR = 43;  // blockhash fail advance nonce instr
  RUNTIME_TXN_TXN_ERR_BLOCKHASH_FAIL_WRONG_NONCE = 44;  // blockhash fail wrong nonce
}

// Instruction execution error; only meaningful when txn_err = instruction_error
enum RuntimeTxnExecErr {
  RUNTIME_TXN_EXEC_ERR_UNSPECIFIED = 0;
  RUNTIME_TXN_EXEC_ERR_SUCCESS = 1;  // instruction succeeded
  RUNTIME_TXN_EXEC_ERR_GENERIC_ERR = 2;  // The program instruction returned an error
  RUNTIME_TXN_EXEC_ERR_INVALID_ARG = 3;  // The arguments provided to a program were invalid
  RUNTIME_TXN_EXEC_ERR_INVALID_INSTR_DATA = 4;  // An instruction's data contents were invalid
  RUNTIME_TXN_EXEC_ERR_INVALID_ACC_DATA = 5;  // An account's data contents was invalid
  RUNTIME_TXN_EXEC_ERR_ACC_DATA_TOO_SMALL = 6;  // An account's data was too small
  RUNTIME_TXN_EXEC_ERR_INSUFFICIENT_FUNDS = 7;  // An account's balance was too small to complete the instruction
  RUNTIME_TXN_EXEC_ERR_INCORRECT_PROGRAM_ID = 8;  // The account did not have the expected program id
  RUNTIME_TXN_EXEC_ERR_MISSING_REQUIRED_SIGNATURE = 9;  // A signature was required but not found
  RUNTIME_TXN_EXEC_ERR_ACC_ALREADY_INITIALIZED = 10;  // An initialize instruction was sent to an account that has already been initialized.
  RUNTIME_TXN_EXEC_ERR_UNINITIALIZED_ACCOUNT = 11;  // An attempt to operate on an account that hasn't been initialized.
  RUNTIME_TXN_EXEC_ERR_UNBALANCED_INSTR = 12;  // Program's instruction lamport balance does not equal the balance after the instruction
  RUNTIME_TXN_EXEC_ERR_MODIFIED_PROGRAM_ID = 13;  // Program illegally modified an account's program id
  RUNTIME_TXN_EXEC_ERR_EXTERNAL_ACCOUNT_LAMPORT_SPEND = 14;  // Program spent the lamports of an account that doesn't belong to it
  RUNTIME_TXN_EXEC_ERR_EXTERNAL_DATA_MODIFIED = 15;  // Program modified the data of an account that doesn't belong to it
  RUNTIME_TXN_EXEC_ERR_READONLY_LAMPORT_CHANGE = 16;  // Read-only account's lamports modified
  RUNTIME_TXN_EXEC_ERR_READONLY_DATA_MODIFIED = 17;  // Read-only account's data was modified
  RUNTIME_TXN_EXEC_ERR_DUPLICATE_ACCOUNT_IDX = 18;  // An account was referenced more than once in a single instruction. Deprecated.
  RUNTIME_TXN_EXEC_ERR_EXECUTABLE_MODIFIED = 19;  // Executable bit on account changed, but shouldn't have
  RUNTIME_TXN_EXEC_ERR_RENT_EPOCH_MODIFIED = 20;  // Rent_epoch account changed, but shouldn't have
  RUNTIME_TXN_EXEC_ERR_NOT_ENOUGH_ACC_KEYS = 21;  // The instruction expected additional account keys
  RUNTIME_TXN_EXEC_ERR_ACC_DATA_SIZE_CHANGED = 22;  // Program other than the account's owner changed the size of the account data
  RUNTIME_TXN_EXEC_ERR_ACC_NOT_EXECUTABLE = 23;  // The instruction expected an executable account
  RUNTIME_TXN_EXEC_ERR_ACC_BORROW_FAILED = 24;  // Failed to borrow a reference to account data, already borrowed
  RUNTIME_TXN_EXEC_ERR_ACC_BORROW_OUTSTANDING = 25;  // Account data has an outstanding reference after a program's execution
  RUNTIME_TXN_EXEC_ERR_DUPLICATE_ACCOUNT_OUT_OF_SYNC = 26;  // The same account was multiply passed to an on-chain program's entrypoint, but the program modified them differently.
  RUNTIME_TXN_EXEC_ERR_CUSTOM_ERR = 27;  // Allows on-chain programs to implement program-specific error types and see them returned by the runtime.
  RUNTIME_TXN_EXEC_ERR_INVALID_ERR = 28;  // The return value from the program was invalid.
  RUNTIME_TXN_EXEC_ERR_EXECUTABLE_DATA_MODIFIED = 29;  // Executable account's data was modified
  RUNTIME_TXN_EXEC_ERR_EXECUTABLE_LAMPORT_CHANGE = 30;  // Executable account's lamports modified
  RUNTIME_TXN_EXEC_ERR_EXECUTABLE_ACCOUNT_NOT_RENT_EXEMPT = 31;  // Executable accounts must be rent exempt
  RUNTIME_TXN_EXEC_ERR_UNSUPPORTED_PROGRAM_ID = 32;  // Unsupported program id
  RUNTIME_TXN_EXEC_ERR_CALL_DEPTH = 33;  // Cross-program invocation call depth too deep
  RUNTIME_TXN_EXEC_ERR_MISSING_ACC = 34;  // An account required by the instruction is missing
  RUNTIME_TXN_EXEC_ERR_REENTRANCY_NOT_ALLOWED = 35;  // Cross-program invocation reentrancy not allowed for this instruction
  RUNTIME_TXN_EXEC_ERR_MAX_SEED_LENGTH_EXCEEDED = 36;  // Length of the seed is too long for address generation
  RUNTIME_TXN_EXEC_ERR_INVALID_SEEDS = 37;  // Provided seeds do not result in a valid address
  RUNTIME_TXN_EXEC_ERR_INVALID_REALLOC = 38;  // Failed to reallocate account data of this length
  RUNTIME_TXN_EXEC_ERR_COMPUTE_BUDGET_EXCEEDED = 39;  // Computational budget exceeded
  RUNTIME_TXN_EXEC_ERR_PRIVILEGE_ESCALATION = 40;  // Cross-program invocation with unauthorized signer or writable account
  RUNTIME_TXN_EXEC_ERR_PROGRAM_ENVIRONMENT_SETUP_FAILURE = 41;  // Failed to create program execution environment
  RUNTIME_TXN_EXEC_ERR_PROGRAM_FAILED_TO_COMPLETE = 42;  // Program failed to complete
  RUNTIME_TXN_EXEC_ERR_PROGRAM_FAILED_TO_COMPILE = 43;  // Program failed to compile
  RUNTIME_TXN_EXEC_ERR_ACC_IMMUTABLE = 44;  // Account is immutable
  RUNTIME_TXN_EXEC_ERR_INCORRECT_AUTHORITY = 45;  // Incorrect authority provided
  RUNTIME_TXN_EXEC_ERR_BORSH_IO_ERROR = 46;  // Failed to serialize or deserialize account data
  RUNTIME_TXN_EXEC_ERR_ACC_NOT_RENT_EXEMPT = 47;  // An account does not have enough lamports to be rent-exempt
  RUNTIME_TXN_EXEC_ERR_INVALID_ACC_OWNER = 48;  // Invalid account owner
  RUNTIME_TXN_EXEC_ERR_ARITHMETIC_OVERFLOW = 49;  // Program arithmetic overflowed
  RUNTIME_TXN_EXEC_ERR_UNSUPPORTED_SYSVAR = 50;  // Unsupported sysvar
  RUNTIME_TXN_EXEC_ERR_ILLEGAL_OWNER = 51;  // Provided owner is not allowed
  RUNTIME_TXN_EXEC_ERR_MAX_ACCS_DATA_ALLOCS_EXCEEDED = 52;  // Account data allocation exceeded the maximum accounts data size limit
  RUNTIME_TXN_EXEC_ERR_MAX_ACCS_EXCEEDED = 53;  // Max accounts exceeded
  RUNTIME_TXN_EXEC_ERR_MAX_INSN_TRACE_LENS_EXCEEDED = 54;  // Max instruction trace length exceeded
  RUNTIME_TXN_EXEC_ERR_BUILTINS_MUST_CONSUME_CUS = 55;  // Builtin programs must consume compute units
}

// Source kind of exec_err; only meaningful when txn_err = instruction_error
enum RuntimeTxnExecErrKind {
  RUNTIME_TXN_EXEC_ERR_KIND_UNSPECIFIED = 0;
  RUNTIME_TXN_EXEC_ERR_KIND_NONE = 1;  // no instruction error
  RUNTIME_TXN_EXEC_ERR_KIND_EBPF = 2;  // eBPF VM error
  RUNTIME_TXN_EXEC_ERR_KIND_SYSCALL = 3;  // Syscall error
  RUNTIME_TXN_EXEC_ERR_KIND_INSTR = 4;  // Instruction error
}

// Slot that was voted on
message SignedVoteTower {
  // Slot being voted on / locked out for
  uint64 slot = 1;
  // Confirmation count (higher = closer to root)
  uint32 confirmation_count = 2;
}

// Program id entry
message RuntimeTxnProgramIds {
  // Top-level program pubkey
  bytes pubkey = 1;
}

// Readonly-locked account entry
message RuntimeTxnReadonlyAccounts {
  // Readonly-locked account pubkey
  bytes pubkey = 1;
}

// Writable-locked account entry
message RuntimeTxnWritableAccounts {
  // Writable-locked account pubkey
  bytes pubkey = 1;
}

// Per-account diff entry
message RuntimeTxnAccountDiffs {
  // Account pubkey
  bytes pubkey = 1;
  // Post-state owner pubkey
  bytes owner = 2;
  // Post-state lamports
  uint64 lamports = 3;
  // Pre-state lamports
  uint64 prev_lamports = 4;
  // Post-state data size in bytes
  uint64 data_sz = 5;
  // Pre-state data size in bytes
  uint64 prev_data_sz = 6;
  // True if the post-state account is executable
  bool is_executable = 7;
  // True if this write touched the stake cache
  bool is_stake_update = 8;
  // True if this write touched the vote cache
  bool is_vote_update = 9;
  // True if this write created a new vote account
  bool is_new_vote = 10;
  // True if this write removed a vote account
  bool is_rm_vote = 11;
}

// The validator received a verified, deduplicated transaction
message Txn {
  // The source IP address of the transaction sender
  bytes source_ip = 1;
  // The source port of the transaction sender
  uint32 source_port = 2;
  // The protocol used to submit the transaction (e.g., QUIC, UDP, ...)
  TxnProtocol protocol = 3;
  // The ID of the bundle this transaction belongs to, if any.  Zero indicates not a bundle transaction
  uint64 bundle_id = 4;
  // The total number of transactions in the bundle this transaction belongs to, if any
  uint32 bundle_txn_count = 5;
  // The commission percentage for the bundle this transaction belongs to, if any
  uint32 bundle_commission = 6;
  // The public key of the commission recipient for the bundle this transaction belongs to, if any
  bytes bundle_commission_pubkey = 7;
  // The raw transaction payload bytes
  bytes payload = 8;
}

// The validator received a valid shred
message Shred {
  // The source IP address of the shred
  bytes source_ip = 1;
  // The source port of the shred
  uint32 source_port = 2;
  // The protocol used to send the shred
  ShredProtocol protocol = 3;
  // The raw shred payload bytes
  bytes payload = 4;
}

// The validator generated a vote transaction
message SignedVote {
  // Serialized signed vote transaction
  bytes signed_txn = 1;
  // The public key of the vote account
  bytes vote_account = 2;
  // The public key that authorized the vote
  bytes vote_authority = 3;
  // The public key that pays for transaction fees
  bytes fee_payer = 4;
  // Signature identifying the transaction
  bytes signature = 5;
  // Slot being voted on (top of tower)
  uint64 vote_slot = 6;
  // Bank hash of the slot being voted on
  bytes vote_bank_hash = 7;
  // Block ID of the slot being voted on
  bytes vote_block_id = 8;
  // Recent blockhash parameter of the vote transaction
  bytes txn_blockhash = 9;
  // Tower of slots being voted on (oldest to newest)
  repeated SignedVoteTower tower = 10;
}

// A slot reached a commitment level. Emitted once per slot per level reached. Join to block_completed on bank_seq, or on slot and block_id.
message SlotConfirmed {
  // Monotonic sequence number identifying this block within the current run; the join key to block_completed. Restarts at 1 each time a snapshot is loaded, so pair it with the stream's boot id. 0 means unavailable, which happens for forward confirmations where the block has not been replayed.
  uint64 bank_seq = 1;
  // The slot being confirmed.
  uint64 slot = 2;
  // Unique identifier of the block being confirmed; the join key to block_completed.
  bytes block_id = 3;
  // Stake in lamports supporting this confirmation. Divide by total_stake for the ratio that crossed the level's threshold. 0 means unavailable.
  uint64 stake = 4;
  // Total cluster stake in lamports at confirmation time; the denominator for the confirmation ratio. 0 means unavailable.
  uint64 total_stake = 5;
  // Whether this block is eligible for fork choice. An equivocating block becomes eligible again only once duplicate confirmed.
  bool valid = 6;
  // The commitment level reached, from weakest to strongest: processed, propagated, duplicate, optimistic, super, rooted. ignored is a separate terminal outcome rather than a strengthening level.
  SlotConfirmedLevel level = 7;
  // True when the block was confirmed by votes seen over gossip before it was replayed locally. Always false for processed and rooted, which require a local replay.
  bool forward = 8;
}

// One row per dispatched transaction (committable or not), with the execution results
message RuntimeTxn {
  // Monotonic sequence number identifying this block within the current run; the join key to block_completed. Restarts at 1 each time a snapshot is loaded, so pair it with the stream's boot id. 0 means unavailable.
  uint64 bank_seq = 1;
  // Bank slot in which this transaction was executed
  uint64 slot = 2;
  // Epoch the transaction was executed in
  uint64 epoch = 3;
  // First signature of the transaction (64 bytes)
  bytes signature = 4;
  // Blockhash referenced by the transaction
  bytes blockhash = 5;
  // Fee-payer pubkey
  bytes fee_payer = 6;
  // Merkle root of the most recently completed FEC set in the block at the time this txn was dispatched for execution
  bytes dispatch_fec_mr = 7;
  // True if the transaction was classified as a simple vote, false otherwise
  bool is_simple_vote = 8;
  // True if the transaction is part of a Jito bundle, false otherwise
  bool is_bundle = 9;
  // True if the transaction was committable (landed on-chain)
  bool is_committable = 10;
  // True if the transaction landed but only fees were charged (e.g. account loading failure)
  bool is_fees_only = 11;
  // Transaction execution error (success when transaction succeeded)
  RuntimeTxnTxnErr txn_err = 12;
  // Instruction execution error; only meaningful when txn_err = instruction_error
  RuntimeTxnExecErr exec_err = 13;
  // Source kind of exec_err; only meaningful when txn_err = instruction_error
  RuntimeTxnExecErrKind exec_err_kind = 14;
  // Instruction index that failed (INT_MAX if not applicable)
  uint32 exec_err_idx = 15;
  // Custom error code returned by the program (only meaningful for CUSTOM_ERROR)
  uint32 custom_err = 16;
  // Compute unit limit requested by the transaction
  uint64 compute_unit_limit = 17;
  // Compute unit price (micro-lamports per CU) requested by the transaction
  uint64 compute_unit_price = 18;
  // compute_unit_limit minus the remaining compute meter at commit
  uint64 compute_units_consumed = 19;
  // Requested heap size for the VM
  uint64 heap_size = 20;
  // Number of builtin program instructions in the transaction
  uint64 num_builtin_instrs = 21;
  // Number of BPF (non-builtin) program instructions
  uint64 num_non_builtin_instrs = 22;
  // Total bytes of account data loaded for this transaction
  uint64 loaded_accounts_data_size = 23;
  // Configured loaded-accounts-data-size limit for this transaction
  uint64 loaded_accounts_data_size_limit = 24;
  // Absolute magnitude of net delta in writable account data sizes during execution; check accounts_resize_is_negative for sign
  uint64 accounts_resize_delta = 25;
  // True when the net delta is negative (writable account data net shrunk during execution)
  bool accounts_resize_is_negative = 26;
  // Execution fee paid by the fee payer
  uint64 execution_fee = 27;
  // Priority fee paid by the fee payer
  uint64 priority_fee = 28;
  // Jito tips paid during execution
  uint64 tips = 29;
  // Number of signatures in the transaction
  uint64 signature_count = 30;
  // Cost-tracker signature cost
  uint32 cost_signature = 31;
  // Cost-tracker write-lock cost
  uint32 cost_write_lock = 32;
  // Cost-tracker data-bytes cost
  uint32 cost_data_bytes = 33;
  // Cost-tracker programs-execution cost
  uint32 cost_programs_execution = 34;
  // Cost-tracker loaded-accounts-data-size cost
  uint32 cost_loaded_accounts_data_size = 35;
  // Allocated accounts data size from the cost tracker
  uint64 cost_allocated_accounts_data_size = 36;
  // Per-account diffs for writable accounts that were modified
  repeated RuntimeTxnAccountDiffs account_diffs = 37;
  // Every account the transaction locked as writable
  repeated RuntimeTxnWritableAccounts writable_accounts = 38;
  // Every account the transaction locked as readonly, in account-order
  repeated RuntimeTxnReadonlyAccounts readonly_accounts = 39;
  // Distinct program pubkeys invoked at the top level of this transaction
  repeated RuntimeTxnProgramIds program_ids = 40;
}

// Combined event type
message Event {
  oneof event {
    Txn txn = 1;
    Shred shred = 2;
    SignedVote signed_vote = 3;
    SlotConfirmed slot_confirmed = 4;
    RuntimeTxn runtime_txn = 5;
  }
}
