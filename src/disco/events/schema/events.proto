syntax = "proto3";

package events.v1;

// The protocol used to submit the transaction (e.g., QUIC, UDP, ...)
enum TxnProtocol {
  TXN_PROTOCOL_UNSPECIFIED = 0;
  TXN_PROTOCOL_QUIC = 1;  // QUIC
  TXN_PROTOCOL_UDP = 2;  // UDP
  TXN_PROTOCOL_GOSSIP = 3;  // Gossip
  TXN_PROTOCOL_BUNDLE = 4;  // Bundle
  TXN_PROTOCOL_TXSEND = 5;  // Internal vote sender
}

// The protocol used to send the shred
enum ShredProtocol {
  SHRED_PROTOCOL_UNSPECIFIED = 0;
  SHRED_PROTOCOL_TURBINE = 1;  // Turbine
  SHRED_PROTOCOL_REPAIR = 2;  // Repair
  SHRED_PROTOCOL_LEADER = 3;  // Leader
}

// The commitment level reached, from weakest to strongest: processed, propagated, duplicate, optimistic, super, rooted. ignored is a separate terminal outcome rather than a strengthening level.
enum SlotConfirmedLevel {
  SLOT_CONFIRMED_LEVEL_UNSPECIFIED = 0;
  SLOT_CONFIRMED_LEVEL_IGNORED = 1;  // Replay finished a block that consensus had already pruned, so it never reached any commitment level.
  SLOT_CONFIRMED_LEVEL_PROCESSED = 2;  // Replayed locally on the majority fork, with no cluster stake required. Equivalent to Solana's 'processed' commitment.
  SLOT_CONFIRMED_LEVEL_PROPAGATED = 3;  // More than a third of stake has observed the block, confirming it has propagated.
  SLOT_CONFIRMED_LEVEL_DUPLICATE = 4;  // At least 52% of stake voted for this exact block, guaranteeing the cluster converges on it even when a slot equivocates.
  SLOT_CONFIRMED_LEVEL_OPTIMISTIC = 5;  // More than two thirds of stake voted for the block. Equivalent to Solana's 'confirmed' commitment.
  SLOT_CONFIRMED_LEVEL_SUPER = 6;  // More than four fifths of stake voted for the block. Used when waiting for a supermajority at boot.
  SLOT_CONFIRMED_LEVEL_ROOTED = 7;  // The block or a descendant reached maximum lockout and can never be rolled back. The strongest level, equivalent to Solana's 'finalized' commitment.
}

// Slot that was voted on
message SignedVoteTower {
  // Slot being voted on / locked out for
  uint64 slot = 1;
  // Confirmation count (higher = closer to root)
  uint32 confirmation_count = 2;
}

// The validator received a verified, deduplicated transaction
message Txn {
  // The source IP address of the transaction sender
  bytes source_ip = 1;
  // The source port of the transaction sender
  uint32 source_port = 2;
  // The protocol used to submit the transaction (e.g., QUIC, UDP, ...)
  TxnProtocol protocol = 3;
  // The ID of the bundle this transaction belongs to, if any.  Zero indicates not a bundle transaction
  uint64 bundle_id = 4;
  // The total number of transactions in the bundle this transaction belongs to, if any
  uint32 bundle_txn_count = 5;
  // The commission percentage for the bundle this transaction belongs to, if any
  uint32 bundle_commission = 6;
  // The public key of the commission recipient for the bundle this transaction belongs to, if any
  bytes bundle_commission_pubkey = 7;
  // The raw transaction payload bytes
  bytes payload = 8;
}

// The validator received a valid shred
message Shred {
  // The source IP address of the shred
  bytes source_ip = 1;
  // The source port of the shred
  uint32 source_port = 2;
  // The protocol used to send the shred
  ShredProtocol protocol = 3;
  // The raw shred payload bytes
  bytes payload = 4;
}

// The validator generated a vote transaction
message SignedVote {
  // Serialized signed vote transaction
  bytes signed_txn = 1;
  // The public key of the vote account
  bytes vote_account = 2;
  // The public key that authorized the vote
  bytes vote_authority = 3;
  // The public key that pays for transaction fees
  bytes fee_payer = 4;
  // Signature identifying the transaction
  bytes signature = 5;
  // Slot being voted on (top of tower)
  uint64 vote_slot = 6;
  // Bank hash of the slot being voted on
  bytes vote_bank_hash = 7;
  // Block ID of the slot being voted on
  bytes vote_block_id = 8;
  // Recent blockhash parameter of the vote transaction
  bytes txn_blockhash = 9;
  // Tower of slots being voted on (oldest to newest)
  repeated SignedVoteTower tower = 10;
}

// A slot reached a commitment level. Emitted once per slot per level reached. Join to block_completed on bank_seq, or on slot and block_id.
message SlotConfirmed {
  // Monotonic sequence number identifying this block within the current run; the join key to block_completed. Restarts at 1 each time a snapshot is loaded, so pair it with the stream's boot id. 0 means unavailable, which happens for forward confirmations where the block has not been replayed.
  uint64 bank_seq = 1;
  // The slot being confirmed.
  uint64 slot = 2;
  // Unique identifier of the block being confirmed; the join key to block_completed.
  bytes block_id = 3;
  // Stake in lamports supporting this confirmation. Divide by total_stake for the ratio that crossed the level's threshold. 0 means unavailable.
  uint64 stake = 4;
  // Total cluster stake in lamports at confirmation time; the denominator for the confirmation ratio. 0 means unavailable.
  uint64 total_stake = 5;
  // Whether this block is eligible for fork choice. An equivocating block becomes eligible again only once duplicate confirmed.
  bool valid = 6;
  // The commitment level reached, from weakest to strongest: processed, propagated, duplicate, optimistic, super, rooted. ignored is a separate terminal outcome rather than a strengthening level.
  SlotConfirmedLevel level = 7;
  // True when the block was confirmed by votes seen over gossip before it was replayed locally. Always false for processed and rooted, which require a local replay.
  bool forward = 8;
}

// Combined event type
message Event {
  oneof event {
    Txn txn = 1;
    Shred shred = 2;
    SignedVote signed_vote = 3;
    SlotConfirmed slot_confirmed = 4;
  }
}
