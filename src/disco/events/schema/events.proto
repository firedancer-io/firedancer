syntax = "proto3";

package events.v1;

// The protocol used to submit the transaction (e.g., QUIC, UDP, ...)
enum TxnProtocol {
  TXN_PROTOCOL_UNSPECIFIED = 0;
  TXN_PROTOCOL_QUIC = 1;  // QUIC
  TXN_PROTOCOL_UDP = 2;  // UDP
  TXN_PROTOCOL_GOSSIP = 3;  // Gossip
  TXN_PROTOCOL_BUNDLE = 4;  // Bundle
  TXN_PROTOCOL_SEND = 5;  // Internal vote sender
}

// The protocol used to send the shred
enum ShredProtocol {
  SHRED_PROTOCOL_UNSPECIFIED = 0;
  SHRED_PROTOCOL_TURBINE = 1;  // Turbine
  SHRED_PROTOCOL_REPAIR = 2;  // Repair
  SHRED_PROTOCOL_LEADER = 3;  // Leader
}

// The validator received a verified, deduplicated transaction
message Txn {
  // The source IP address of the transaction sender
  bytes source_ip = 1;
  // The source port of the transaction sender
  uint32 source_port = 2;
  // The protocol used to submit the transaction (e.g., QUIC, UDP, ...)
  TxnProtocol protocol = 3;
  // The ID of the bundle this transaction belongs to, if any.  Zero indicates not a bundle transaction
  uint64 bundle_id = 4;
  // The total number of transactions in the bundle this transaction belongs to, if any
  uint32 bundle_txn_count = 5;
  // The commission percentage for the bundle this transaction belongs to, if any
  uint32 bundle_commission = 6;
  // The public key of the commission recipient for the bundle this transaction belongs to, if any
  bytes bundle_commission_pubkey = 7;
  // The raw transaction payload bytes
  bytes payload = 8;
}

// The validator received a valid shred
message Shred {
  // The source IP address of the shred
  bytes source_ip = 1;
  // The source port of the shred
  uint32 source_port = 2;
  // The protocol used to send the shred
  ShredProtocol protocol = 3;
  // The raw shred payload bytes
  bytes payload = 4;
}

// An account update produced during transaction execution or bank hashing.
// This is metadata-only: data bytes are not included.
message Account {
  // The account public key
  bytes pubkey = 1;
  // The account lamport balance after the update
  uint64 lamports = 2;
  // The account owner program public key
  bytes owner = 3;
  // Whether the account is executable
  bool executable = 4;
  // The slot in which the update occurred
  uint64 slot = 5;
  // Signature of the transaction that caused this update (64 bytes);
  // all-zero if not associated with a transaction (e.g. bank-hash-time
  // updates).
  bytes signature = 6;
  // The size of the account data in bytes
  uint64 data_sz = 7;
}

// A bank hash computed at the end of a slot's execution.
message BankHash {
  // Bank hash of this slot
  bytes bank_hash = 1;
  // Bank hash of the parent slot
  bytes prev_bank_hash = 2;
  // Accounts lt hash checksum (blake3 of the accounts lthash)
  bytes accounts_lt_hash_checksum = 3;
  // Proof-of-history hash at the end of the slot
  bytes poh_hash = 4;
  // Slot this bank hash is for
  uint64 slot = 5;
  // Total number of signatures processed in the slot
  uint64 signature_cnt = 6;
}

// A stake-cache delegation update emitted during transaction commit.
message StakeDelegation {
  // Stake account pubkey
  bytes pubkey = 1;
  // Vote account this stake delegates to (zeros if removed)
  bytes voter_pubkey = 2;
  // Delegated stake amount (lamports)
  uint64 stake = 3;
  // Epoch when this delegation activated
  uint64 activation_epoch = 4;
  // Epoch when this delegation deactivates (ULONG_MAX if active)
  uint64 deactivation_epoch = 5;
  // Credits observed snapshot
  uint64 credits_observed = 6;
  // Slot in which this update occurred
  uint64 slot = 7;
  // True if the delegation was removed (closed/invalid stake account)
  bool removed = 8;
}

// A top-votes cache update emitted during transaction commit.
message VoteUpdate {
  // Vote account pubkey
  bytes pubkey = 1;
  // Last vote slot observed in the vote account
  uint64 last_vote_slot = 2;
  // Last vote timestamp observed (unix seconds)
  int64 last_vote_timestamp = 3;
  // Bank slot in which this update occurred
  uint64 slot = 4;
  // True if the vote account was invalidated (withdrawn / wrong size / etc)
  bool invalidated = 5;
}

// A single lockout entry in a vote's tower.
message VoteLockout {
  // Slot being voted on / locked out for
  uint64 slot = 1;
  // Confirmation count (higher = closer to root)
  uint32 confirmation_count = 2;
}

// A vote-program instruction observed during transaction execution.
// Captures the on-the-wire vote contents (tower, bank hash being voted
// for, voter) at processing time — regardless of whether the
// transaction ultimately succeeds.
message VoteTransaction {
  // Vote account (instruction account[0])
  bytes vote_account = 1;
  // First signer of the transaction (typically the authorized voter)
  bytes voter = 2;
  // Bank hash being voted for
  bytes bank_hash = 3;
  // Block id being voted for (zeros if not present, e.g. legacy variants)
  bytes block_id = 4;
  // Bank slot in which this instruction is being processed
  uint64 slot = 5;
  // Root slot in the vote (0 if has_root=false)
  uint64 root_slot = 6;
  // Vote timestamp (0 if has_timestamp=false)
  int64 timestamp = 7;
  // True if root_slot is meaningful
  bool has_root = 8;
  // True if timestamp is meaningful
  bool has_timestamp = 9;
  // True if block_id is meaningful (tower_sync variants)
  bool has_block_id = 10;
  // Vote instruction variant discriminator (fd_vote_instruction_enum_*)
  uint32 ix_variant = 11;
  // Tower of slots being voted on (newest at end)
  repeated VoteLockout tower = 12;
  // First signature of the transaction containing this vote ix (64 B)
  bytes signature = 13;
}

// Combined event type
message Event {
  oneof event {
    Txn txn = 1;
    Shred shred = 2;
    Account account = 3;
    BankHash bank_hash = 4;
    StakeDelegation stake_delegation = 5;
    VoteUpdate vote_update = 6;
    VoteTransaction vote_transaction = 7;
  }
}
