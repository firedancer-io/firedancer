[layout]
    shred_tile_count = 4
[tiles]
    [tiles.gui]
        enabled = false
    [tiles.rpc]
        enabled = false
[accounts]
    file_size_gib = {funk_pages}
    max_accounts = {index_max}
[runtime]
    max_live_slots = 128
    fixed_fec_sets = true
    max_fork_width = 4
    [runtime.program_cache]
        heap_size_mib = 4096
[development]
    sandbox = false
    no_agave = true
    no_clone = true
[log]
    level_stderr = "INFO"
    path = "{log}"
[paths]
    snapshots = "{ledger}"
[snapshots]
    incremental_snapshots = false
    max_full_snapshots_to_keep = 5
    [snapshots.sources]
        servers = []
        [snapshots.sources.gossip]
            allow_any = false
            allow_list = []
[gossip]
    entrypoints = [ "0.0.0.0:1" ]
[development.ledger_input]
    format = "rocksdb"
    path = "{ledger}/rocksdb"
    end_slot = {end_slot}
[development.backtest]
    root_distance = 32
