# This workspace advertises the nested local packs so the CLI resolves them
# from the repository instead of trying to fetch them from a registry.
provide:
  - "lib/qlpack.yml"
  - "src/dev/qlpack.yml"
  - "src/nightly/qlpack.yml"
  - "test/qlpack.yml"

registries:
 - packages: 'codeql/*'
   url: https://ghcr.io/v2/
