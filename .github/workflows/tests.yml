# Runs unit tests, script tests, and fuzz tests.

name: Tests
on:
  workflow_call:
  workflow_dispatch:
  merge_group:
concurrency:
  group: tests_${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  unit-test:
    strategy:
      # We cannot possibly test everything on every commit.
      # This matrix is a tradeoff between required resources and
      # test coverage.  You should probably only remove machine
      # targets from here, not add more.
      matrix:
        test-case:
          - linux_gcc_noarch64-gcc-12    # least capable target
          - linux_gcc_noarch64-gcc-8
          - linux_gcc_x86_64
          - linux_gcc_icelake     #  most capable target
          - linux_clang_x86_64
          - linux_clang_icelake
          - native
        # Attach additional params to machine types
        include:
          - test-case: linux_gcc_noarch64-gcc-12 
            machine: linux_gcc_noarch64
            label: X64
            targets: "all"
            compiler: gcc
            compiler_version: 12.4.0
            notest: 1
          - test-case: linux_gcc_noarch64-gcc-8
            machine: linux_gcc_noarch64
            label: X64
            targets: "all"
            compiler: gcc
            compiler_version: 8.5.0
            notest: 1
          - test-case: linux_gcc_x86_64
            machine: linux_gcc_x86_64
            label: X64
            compiler: gcc
            compiler_version: 12.4.0
          - test-case: linux_gcc_icelake
            machine: linux_gcc_icelake
            label: icelake
            compiler: gcc
            compiler_version: 12.4.0
          - test-case: linux_clang_x86_64
            machine: linux_clang_x86_64
            label: X64
            compiler: clang
            compiler-version: 15.0.6
          - test-case: native
            machine: native
            label: self-hosted
            compiler: clang
            compiler-version: 15.0.6
          - test-case: linux_clang_icelake
            machine: linux_clang_icelake
            label: icelake
            extras: asan ubsan
            compiler: clang
            compiler-version: 15.0.6
    runs-on: ${{ matrix.label }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/deps
        with:
          compiler: ${{ matrix.compiler }}
          compiler-version: ${{ matrix.compiler-version }}
      - uses: ./.github/actions/hugepages
      - uses: dtolnay/rust-toolchain@1.73.0

      - name: Run tests
        run: |
          sudo prlimit --pid $$ --memlock=-1:-1
          source /opt/${{ matrix.compiler }}/${{ matrix.compiler }}-${{ matrix.version }}/activate
          MACHINES=${{ matrix.machine }} \
          EXTRAS="${{ matrix.extras || '' }}" \
          NOTEST=${{ matrix.notest || '' }} \
          TARGETS="${{ matrix.targets || '' }}" \
          CC="${{ matrix.compiler }}" \
          contrib/test/ci_tests.sh
