name: submodule-init
description: 'Initialize submodules with file locking to prevent concurrent access'
runs:
  using: composite
  steps:
    - name: Init submodules
      shell: bash
      run: |
        echo "Waiting for submodule lock..."
        exec 9>/tmp/firedancer-git-submodules.lock
        if ! flock -x -w 300 9; then
          echo "Failed to acquire submodule lock within timeout" >&2
          exit 1
        fi
        echo "Lock acquired, cleaning stale git lock files..."
        find .git/modules -name "*.lock" -delete 2>/dev/null || true
        echo "Updating submodules..."
        git submodule update --init --recursive
        echo "Submodules initialized successfully"
